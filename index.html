<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duelo Biblico - Sigo com Fe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: url('https://res.cloudinary.com/degxiuf43/image/upload/v1781572333/duelo-biblico/jmzrst3lnzru9jrt2bzx.jpg') center center / cover no-repeat fixed; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { max-width: 500px; width: 100%; padding: 20px; }
.logo { text-align: center; margin-bottom: 30px; }
.logo h1 { font-size: 28px; color: #f0c040; }
.logo p { color: #aaa; font-size: 14px; margin-top: 4px; }
.card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); }
label { display: block; margin-bottom: 8px; color: #ccc; font-size: 14px; }
input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 16px; margin-bottom: 16px; outline: none; }
button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
.btn-primary { background: linear-gradient(135deg,#f0c040,#e08020); color: #1a0533; margin-top: 8px; }
.btn-lang { background: rgba(255,255,255,0.08); color: white; border: 2px solid rgba(255,255,255,0.2); padding: 10px; font-size: 13px; border-radius: 10px; }
.btn-lang.active { border-color: #f0c040; background: rgba(240,192,64,0.15); color: #f0c040; font-weight: bold; }
.langs { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
.timer { font-size: 56px; font-weight: bold; text-align: center; color: #f0c040; }
.timer.urgente { color: #e74c3c; }
.pergunta { font-size: 18px; text-align: center; margin: 16px 0 20px; line-height: 1.6; }
.alternativa { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); padding: 14px; border-radius: 10px; cursor: pointer; text-align: left; width: 100%; color: white; font-size: 15px; margin-bottom: 8px; }
.alternativa.certa { background: rgba(39,174,96,0.3); border-color: #27ae60; }
.alternativa.errada { background: rgba(231,76,60,0.3); border-color: #e74c3c; }
.alternativa:disabled { cursor: default; }
.placar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.placar-item { text-align: center; }
.placar-item .pts { font-size: 28px; font-weight: bold; color: #f0c040; }
.placar-item .nome { font-size: 12px; color: #aaa; }
.aviso { background: rgba(240,192,64,0.15); border: 1px solid #f0c040; border-radius: 8px; padding: 8px; text-align: center; font-size: 13px; color: #f0c040; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="container">

<div id="tela-inicio">
  <div class="logo">
    <h1>Duelo Biblico</h1>
    <p id="txt-sub">Sigo com Fe - 7 Idiomas</p>
  </div>
  <div class="card">
    <label id="txt-lang">Escolhe o teu idioma:</label>
    <div class="langs">
      <button class="btn-lang active" onclick="setLang('pt',this)">PT</button>
      <button class="btn-lang" onclick="setLang('en',this)">EN</button>
      <button class="btn-lang" onclick="setLang('es',this)">ES</button>
      <button class="btn-lang" onclick="setLang('fr',this)">FR</button>
      <button class="btn-lang" onclick="setLang('de',this)">DE</button>
      <button class="btn-lang" onclick="setLang('ro',this)">RO</button>
      <button class="btn-lang" onclick="setLang('ru',this)">RU</button>
    </div>
    <label id="txt-nome-label">O teu nome:</label>
    <input type="text" id="nome" placeholder="Nome..." maxlength="20">
    <button class="btn-primary" id="btn-jogar" onclick="jogar()">Procurar Oponente</button>
  </div>
</div>

<div id="tela-espera" style="display:none">
  <div class="card" style="text-align:center;padding:40px;">
    <p style="font-size:40px;margin-bottom:16px">[ ]</p>
    <p id="msg-espera" style="font-size:18px;margin-bottom:8px">A procurar oponente...</p>
    <p style="color:#888;font-size:14px" id="msg-sub">Por favor aguarda</p>
    <button class="btn-primary" onclick="cancelar()" id="btn-cancel" style="margin-top:20px">Cancelar</button>
  </div>
</div>

<div id="tela-jogo" style="display:none">
  <div class="card" style="padding:16px">
    <div class="placar">
      <div class="placar-item">
        <div class="pts" id="pts-eu">0</div>
        <div class="nome" id="nome-eu">Tu</div>
      </div>
      <div style="text-align:center">
        <div class="timer" id="timer">15</div>
        <div style="font-size:11px;color:#888" id="nperg">1/10</div>
      </div>
      <div class="placar-item">
        <div class="pts" id="pts-op">0</div>
        <div class="nome" id="nome-op">Oponente</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="aviso" id="aviso"></div>
    <div class="pergunta" id="pergunta"></div>
    <div id="alts"></div>
  </div>
</div>

<div id="tela-fim" style="display:none">
  <div class="card" style="text-align:center">
    <p style="font-size:48px;margin-bottom:12px" id="fim-icon">-</p>
    <p style="font-size:24px;font-weight:bold;margin-bottom:16px" id="fim-titulo">Fim</p>
    <div id="fim-lista" style="margin-bottom:20px"></div>
    <button class="btn-primary" id="btn-novo" onclick="reiniciar()">Jogar Novamente</button>
  </div>
</div>

</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const SRV = 'https://sigo-com-fe-api.onrender.com';
const TX = {
  pt:{sub:'Sigo com Fe - 7 Idiomas',lang:'Escolhe o teu idioma:',nome:'O teu nome:',ph:'Nome...',jogar:'Procurar Oponente',cancel:'Cancelar',espera:'A procurar oponente...',sub2:'Por favor aguarda',achado:'Oponente encontrado!',op_resp:'Oponente ja respondeu!',ganhou:'Venceste!',perdeu:'Boa tentativa!',empate:'Empate!',novo:'Jogar Novamente',pts:'pts',saiu:'O oponente saiu!'},
  en:{sub:'Sigo com Fe - 7 Languages',lang:'Choose your language:',nome:'Your name:',ph:'Name...',jogar:'Find Opponent',cancel:'Cancel',espera:'Searching for opponent...',sub2:'Please wait',achado:'Opponent found!',op_resp:'Opponent already answered!',ganhou:'You won!',perdeu:'Good try!',empate:'Draw!',novo:'Play Again',pts:'pts',saiu:'Opponent left!'},
  es:{sub:'Sigo com Fe - 7 Idiomas',lang:'Elige tu idioma:',nome:'Tu nombre:',ph:'Nombre...',jogar:'Buscar Oponente',cancel:'Cancelar',espera:'Buscando oponente...',sub2:'Por favor espera',achado:'Oponente encontrado!',op_resp:'El oponente ya respondio!',ganhou:'Ganaste!',perdeu:'Buen intento!',empate:'Empate!',novo:'Jugar de nuevo',pts:'pts',saiu:'El oponente salio!'},
  fr:{sub:'Sigo com Fe - 7 Langues',lang:'Choisissez votre langue:',nome:'Votre nom:',ph:'Nom...',jogar:'Chercher Adversaire',cancel:'Annuler',espera:'Recherche adversaire...',sub2:'Veuillez patienter',achado:'Adversaire trouve!',op_resp:'Adversaire a repondu!',ganhou:'Vous avez gagne!',perdeu:'Bonne tentative!',empate:'Egalite!',novo:'Rejouer',pts:'pts',saiu:"L'adversaire est parti!"},
  de:{sub:'Sigo com Fe - 7 Sprachen',lang:'Waehle deine Sprache:',nome:'Dein Name:',ph:'Name...',jogar:'Gegner suchen',cancel:'Abbrechen',espera:'Suche Gegner...',sub2:'Bitte warten',achado:'Gegner gefunden!',op_resp:'Gegner hat geantwortet!',ganhou:'Du hast gewonnen!',perdeu:'Guter Versuch!',empate:'Unentschieden!',novo:'Nochmal spielen',pts:'Pkt',saiu:'Gegner hat verlassen!'},
  ro:{sub:'Sigo com Fe - 7 Limbi',lang:'Alege limba ta:',nome:'Numele tau:',ph:'Nume...',jogar:'Cauta Adversar',cancel:'Anuleaza',espera:'Se cauta adversar...',sub2:'Te rugam asteapta',achado:'Adversar gasit!',op_resp:'Adversarul a raspuns!',ganhou:'Ai castigat!',perdeu:'Incercare buna!',empate:'Egalitate!',novo:'Joaca din nou',pts:'pct',saiu:'Adversarul a plecat!'},
  ru:{sub:'Sigo com Fe - 7 yazykov',lang:'Vyberi yazyk:',nome:'Tvoyo imya:',ph:'Imya...',jogar:'Nayti sopernika',cancel:'Otmena',espera:'Poisk sopernika...',sub2:'Pozhaluysta zhdi',achado:'Sopernik nayden!',op_resp:'Sopernik uzhe otvetil!',ganhou:'Ty pobedil!',perdeu:'Khoroshaya popytka!',empate:'Nichya!',novo:'Igrat snova',pts:'pts',saiu:'Sopernik ushel!'}
};
let lang='pt', socket=null, salaId=null, respondeu=false, pAtual=0, ptsEu=0, ptsOp=0;
function t(k){return TX[lang][k]||TX.pt[k]||k;}
function tela(id){['inicio','espera','jogo','fim'].forEach(n=>document.getElementById('tela-'+n).style.display='none');document.getElementById('tela-'+id).style.display='block';}
function setLang(l,btn){lang=l;document.querySelectorAll('.btn-lang').forEach(b=>b.classList.remove('active'));btn.classList.add('active');atualizar();}
function atualizar(){document.getElementById('txt-sub').textContent=t('sub');document.getElementById('txt-lang').textContent=t('lang');document.getElementById('txt-nome-label').textContent=t('nome');document.getElementById('nome').placeholder=t('ph');document.getElementById('btn-jogar').textContent=t('jogar');document.getElementById('btn-cancel').textContent=t('cancel');document.getElementById('btn-novo').textContent=t('novo');}
function jogar(){
  const nome=document.getElementById('nome').value.trim()||'Jogador';
  tela('espera');
  document.getElementById('msg-espera').textContent=t('espera');
  document.getElementById('msg-sub').textContent=t('sub2');
  if(socket)socket.disconnect();
  socket=io(SRV,{path:'/duelo'});
  socket.emit('procurarPartida',{nome,idioma:lang});
  socket.on('status',m=>{document.getElementById('msg-espera').textContent=m;});
  socket.on('inicioJogo',d=>{salaId=d.salaId;document.getElementById('msg-espera').textContent=t('achado');setTimeout(()=>iniciar(d,nome),800);});
  socket.on('novaPergunta',d=>{pAtual++;mostrarP(d.pergunta);});
  socket.on('atualizarTimer',s=>{const el=document.getElementById('timer');el.textContent=s;el.className=s<=5?'timer urgente':'timer';});
  socket.on('oponenteRespondeu',()=>{const a=document.getElementById('aviso');a.textContent=t('op_resp');a.style.display='block';});
  socket.on('fimJogo',js=>fim(js,nome));
  socket.on('oponenteSaiu',()=>{alert(t('saiu'));reiniciar();});
}
function iniciar(d,nome){pAtual=0;ptsEu=0;ptsOp=0;document.getElementById('nome-eu').textContent=nome;document.getElementById('nome-op').textContent=d.oponente;document.getElementById('pts-eu').textContent=0;document.getElementById('pts-op').textContent=0;tela('jogo');mostrarP(d.pergunta);}
function mostrarP(p){respondeu=false;document.getElementById('aviso').style.display='none';document.getElementById('pergunta').textContent=p.q;document.getElementById('nperg').textContent=(pAtual+1)+'/10';const div=document.getElementById('alts');div.innerHTML='';p.a.forEach((a,i)=>{const b=document.createElement('button');b.className='alternativa';b.textContent=a;b.onclick=()=>resp(i,p.c,b);div.appendChild(b);});}
function resp(escolha,certa,btn){if(respondeu)return;respondeu=true;document.querySelectorAll('.alternativa').forEach((b,i)=>{b.disabled=true;if(i===certa)b.classList.add('certa');else if(b===btn)b.classList.add('errada');});socket.emit('enviarResposta',{salaId,escolha});}
function fim(js,nome){tela('fim');const eu=js.find(j=>j.nome===nome);const op=js.find(j=>j.nome!==nome);let icon='=',titulo=t('empate');if(eu&&op){if(eu.pontos>op.pontos){icon='W';titulo=t('ganhou');}else if(eu.pontos<op.pontos){icon='L';titulo=t('perdeu');}}document.getElementById('fim-icon').textContent=icon;document.getElementById('fim-titulo').textContent=titulo;const lista=document.getElementById('fim-lista');lista.innerHTML='';js.sort((a,b)=>b.pontos-a.pontos).forEach((j,i)=>{const d=document.createElement('div');d.style='background:rgba(255,255,255,0.08);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between';d.innerHTML='<span>'+(i+1)+'. '+j.nome+'</span><span style="color:#f0c040;font-weight:bold">'+Math.round(j.pontos)+' '+t('pts')+'</span>';lista.appendChild(d);});}
function cancelar(){if(socket){socket.disconnect();socket=null;}tela('inicio');}
function reiniciar(){if(socket){socket.disconnect();socket=null;}tela('inicio');}
atualizar();
</script>
</body>
</html>
